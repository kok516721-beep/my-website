<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hello work</title>
    <style>
        /* Matrix Background Canvas */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Video တွေရဲ့ အနောက်ရောက်သွားအောင် */
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 5px;
            animation: matrixPulse 2s infinite;
        }

        .video-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .video-item {
            background: rgba(0, 15, 0, 0.85); /* နောက်ခံစာလုံးတွေ မြင်ရအောင် အကြည်လေးထားပါမယ် */
            border: 1px solid #0f0;
            padding: 10px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            transition: transform 0.3s;
            overflow: hidden;
            backdrop-filter: blur(2px); /* ပိုလှအောင် blur ထည့်ထားတာပါ */
        }

        .video-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.6);
        }

        video {
            width: 100%;
            border-radius: 4px;
            border: 1px solid #0f0;
        }

        .video-title-container {
            overflow: hidden;
            white-space: nowrap;
            margin-top: 10px;
            border-top: 1px solid rgba(0, 255, 0, 0.3);
            padding-top: 5px;
        }

        .video-title {
            display: inline-block;
            padding-left: 100%;
            animation: moveText 10s linear infinite;
            font-size: 14px;
            font-weight: bold;
        }

        @keyframes moveText {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        @keyframes matrixPulse {
            0%, 100% { text-shadow: 0 0 5px #0f0; }
            50% { text-shadow: 0 0 20px #0f0, 0 0 30px #0f0; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <h1> Hellowork web page မှ ကြိုဆိုသသည်</h1>

    <div class="video-list">
        <div class="video-item">
            <video controls>
                <source src="media_693171f3d28eb.mp4" type="video/mp4">
            </video>
            <div class="video-title-container">
                <div class="video-title">>>> မိုနာလီ့စာရဲ့အပြုံးက ရင်ခုန်စရာကောင်းမနေဘူးလား... <<<</div>
            </div>
        </div>

        <div class="video-item">
            <video controls>
                <source src="2.mp4" type="video/mp4">
            </video>
            <div class="video-title-container">
                <div class="video-title">>>> ANALYZING FILE: 2.mp4 ... STATUS: DECRYPTED ... <<<</div>
            </div>
        </div>

        <div class="video-item">
            <video controls>
                <source src="3.mp4" type="video/mp4">
            </video>
            <div class="video-title-container">
                <div class="video-title">>>> ANALYZING FILE: 3.mp4 ... STATUS: DECRYPTED ... <<<</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
        </html>
